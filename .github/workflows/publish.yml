name: Publish to Chrome Web Store

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v1.7.1)"
        required: true
        default: "latest"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Release Asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.tag }}" = "latest" ]; then
            gh release download --pattern "*.zip" --clobber
          else
            gh release download ${{ github.event.inputs.tag }} --pattern "*.zip" --clobber
          fi
          # Safely rename to extension.zip only if needed
          [ -f extension.zip ] || mv *.zip extension.zip

      - name: Publish to Chrome Web Store
        run: npx chrome-webstore-upload-cli@3 upload --source extension.zip --auto-publish --extensionId ${EXTENSION_ID}
        env:
          EXTENSION_ID: ${{ vars.EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
